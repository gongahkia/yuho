<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yuho Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; display: flex; flex-direction: column; height: 100vh; background: #1e1e2e; color: #cdd6f4; }
  header { padding: 8px 16px; background: #181825; border-bottom: 1px solid #313244; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 14px; }
  .container { display: flex; flex: 1; overflow: hidden; }
  .panel { flex: 1; display: flex; flex-direction: column; }
  .panel-header { padding: 4px 12px; background: #313244; font-size: 12px; }
  textarea { flex: 1; padding: 12px; border: none; resize: none; background: #1e1e2e; color: #cdd6f4; font-family: monospace; font-size: 13px; outline: none; }
  #output { flex: 1; padding: 12px; overflow: auto; font-size: 13px; white-space: pre-wrap; }
  select { background: #313244; color: #cdd6f4; border: 1px solid #45475a; padding: 2px 8px; font-family: monospace; }
  .divider { width: 1px; background: #313244; }
  .error { color: #f38ba8; }
  .valid { color: #a6e3a1; }
</style>
</head>
<body>
<header>
  <h1>Yuho Playground</h1>
  <div>
    <label>Target: <select id="target">
      <option value="json">JSON</option>
      <option value="english" selected>English</option>
      <option value="mermaid">Mermaid</option>
      <option value="graphql">GraphQL</option>
      <option value="prolog">Prolog</option>
    </select></label>
    <span id="status"></span>
  </div>
</header>
<div class="container">
  <div class="panel">
    <div class="panel-header">Source (.yh)</div>
    <textarea id="source" spellcheck="false">statute 1 "Example Offense" {
  definitions {
    property := "Any movable property";
  }
  elements {
    actus_reus taking := "Takes the property";
    mens_rea dishonestly := "With dishonest intent";
  }
  penalty {
    imprisonment := 1 year .. 3 years;
  }
}</textarea>
  </div>
  <div class="divider"></div>
  <div class="panel">
    <div class="panel-header">Output</div>
    <div id="output">Type Yuho code on the left, see live output here.</div>
  </div>
</div>
<script>
const API = window.YUHO_API_URL || 'http://localhost:8080';
const source = document.getElementById('source');
const output = document.getElementById('output');
const target = document.getElementById('target');
const status = document.getElementById('status');
let debounce = null;

async function transpile() {
  const code = source.value;
  if (!code.trim()) { output.textContent = ''; return; }
  try {
    const res = await fetch(`${API}/v1/transpile`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({source: code, target: target.value}),
    });
    const json = await res.json();
    if (json.success && json.data) {
      output.textContent = json.data.output;
      output.className = 'valid';
      status.textContent = '';
    } else {
      const err = json.error?.message || json.error || 'Unknown error';
      output.textContent = err;
      output.className = 'error';
    }
  } catch (e) {
    output.textContent = `Connection error: ${e.message}\nMake sure yuho api is running.`;
    output.className = 'error';
  }
}

source.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(transpile, 300);
});
target.addEventListener('change', transpile);
transpile();
</script>
</body>
</html>
