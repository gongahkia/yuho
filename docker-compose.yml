services:
  yuho-api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./library:/app/library:ro
      - yuho-config:/root/.config/yuho
    environment:
      - YUHO_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  yuho-mcp:
    build: .
    command: ["serve", "--host", "0.0.0.0", "--port", "8081"]
    ports:
      - "8081:8081"
    volumes:
      - ./library:/app/library:ro
      - yuho-config:/root/.config/yuho
    environment:
      - YUHO_LOG_LEVEL=info
    restart: unless-stopped

volumes:
  yuho-config:
