<h2>Section 302. Punishment for murder</h2>
<div class="content">
<p>Whoever commits murder shall be punished with death, or imprisonment for life, and shall also be liable to fine.</p>
<p>[Act 27 of 1870 substituted "death" for original penalty wording.]</p>
