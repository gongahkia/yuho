<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yuho — Singapore Penal Code companion</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css">
</head>
<body>
  <header>
    <h1>Yuho</h1>
    <p class="tagline">Singapore Penal Code 1871 companion</p>
  </header>

  <main>
    <input id="search" type="search" placeholder="Search by section number or title (e.g. 415, theft)…">

    <ul id="results" aria-live="polite"></ul>

    <section id="detail" hidden>
      <header>
        <h2 id="detail-title"></h2>
        <a id="detail-sso" target="_blank" rel="noopener">on SSO ↗</a>
      </header>
      <p id="detail-summary"></p>
      <div class="actions">
        <button id="action-insert-en">Insert English transpilation</button>
        <button id="action-insert-cite">Insert citation</button>
        <button id="action-insert-elements">Insert element list</button>
        <button id="action-insert-diagram">Insert diagram</button>
      </div>
      <details>
        <summary>Diagram</summary>
        <div id="detail-diagram" class="diagram"><p class="empty">Open a section to load its diagram.</p></div>
      </details>
      <details>
        <summary>Encoded <code>.yh</code></summary>
        <pre id="detail-yh"></pre>
      </details>
    </section>

    <p class="disclaimer">Research / educational artefact. Not legal advice.</p>
    <p id="corpus-version" class="corpus-version" hidden></p>
  </main>

  <script src="taskpane.js"></script>
</body>
</html>
