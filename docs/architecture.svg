<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Yuho architecture</title>
  <desc id="desc">Current Yuho pipeline from source and SSO scrape to AST, analysis, transpilers, verification, and editor surfaces.</desc>
  <style>
    text { font-family: Arial, sans-serif; font-size: 15px; fill: #1f2937; }
    .title { font-size: 22px; font-weight: 700; }
    .group { fill: #f8fafc; stroke: #cbd5e1; }
    .box { fill: #ffffff; stroke: #64748b; }
    .accent { fill: #eff6ff; stroke: #2563eb; }
    .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>

  <text x="40" y="42" class="title">Yuho Architecture</text>

  <rect x="40" y="80" width="220" height="140" rx="6" class="group" />
  <text x="60" y="110">Ingest</text>
  <rect x="70" y="130" width="150" height="34" rx="4" class="box" />
  <text x="92" y="153">SSO scrape</text>
  <rect x="70" y="176" width="150" height="34" rx="4" class="box" />
  <text x="94" y="199">raw act JSON</text>
  <path d="M145 164 V176" class="line" />

  <rect x="330" y="80" width="250" height="180" rx="6" class="group" />
  <text x="350" y="110">Frontend</text>
  <rect x="370" y="130" width="170" height="34" rx="4" class="accent" />
  <text x="421" y="153">.yh source</text>
  <rect x="370" y="176" width="170" height="34" rx="4" class="box" />
  <text x="398" y="199">tree-sitter parser</text>
  <rect x="370" y="222" width="170" height="34" rx="4" class="box" />
  <text x="420" y="245">Python AST</text>
  <path d="M455 164 V176" class="line" />
  <path d="M455 210 V222" class="line" />

  <rect x="650" y="80" width="320" height="180" rx="6" class="group" />
  <text x="670" y="110">Analysis and Verification</text>
  <rect x="680" y="130" width="120" height="34" rx="4" class="box" />
  <text x="699" y="153">lint checks</text>
  <rect x="820" y="130" width="120" height="34" rx="4" class="box" />
  <text x="838" y="153">reference graph</text>
  <rect x="680" y="186" width="120" height="34" rx="4" class="box" />
  <text x="725" y="209">Z3</text>
  <rect x="820" y="186" width="120" height="34" rx="4" class="box" />
  <text x="861" y="209">Alloy</text>

  <path d="M540 239 C600 239 620 147 680 147" class="line" />
  <path d="M540 239 C615 239 750 147 820 147" class="line" />
  <path d="M540 239 C600 239 620 203 680 203" class="line" />
  <path d="M540 239 C615 239 750 203 820 203" class="line" />
  <path d="M220 193 C390 193 500 130 680 147" class="dash" />

  <rect x="40" y="330" width="600" height="210" rx="6" class="group" />
  <text x="60" y="360">Transpilers</text>
  <g>
    <rect x="70" y="385" width="110" height="34" rx="4" class="box" /><text x="108" y="408">JSON</text>
    <rect x="195" y="385" width="110" height="34" rx="4" class="box" /><text x="220" y="408">English</text>
    <rect x="320" y="385" width="110" height="34" rx="4" class="box" /><text x="356" y="408">LaTeX</text>
    <rect x="445" y="385" width="150" height="34" rx="4" class="box" /><text x="471" y="408">Mermaid flow</text>
    <rect x="70" y="440" width="150" height="34" rx="4" class="box" /><text x="92" y="463">Mermaid mindmap</text>
    <rect x="235" y="440" width="110" height="34" rx="4" class="box" /><text x="272" y="463">Alloy</text>
    <rect x="360" y="440" width="110" height="34" rx="4" class="box" /><text x="396" y="463">DOCX</text>
    <rect x="485" y="440" width="110" height="34" rx="4" class="box" /><text x="501" y="463">Akoma Ntoso</text>
  </g>
  <path d="M455 256 C455 300 340 330 340 385" class="line" />

  <rect x="700" y="330" width="270" height="160" rx="6" class="group" />
  <text x="720" y="360">Surfaces</text>
  <rect x="740" y="385" width="190" height="34" rx="4" class="box" />
  <text x="806" y="408">CLI</text>
  <rect x="740" y="432" width="190" height="34" rx="4" class="box" />
  <text x="783" y="455">Language Server</text>
  <rect x="740" y="479" width="190" height="34" rx="4" class="box" />
  <text x="796" y="502">MCP server</text>
  <path d="M540 239 C710 260 770 320 835 385" class="line" />
</svg>
