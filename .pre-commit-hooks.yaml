- id: yuho-check
  name: Yuho statute validation
  entry: yuho check
  language: python
  types: [file]
  files: '\.yh$'
  additional_dependencies: ['yuho']

- id: yuho-lint
  name: Yuho lint
  entry: yuho lint
  language: python
  types: [file]
  files: '\.yh$'
  additional_dependencies: ['yuho']

- id: yuho-fmt-check
  name: Yuho format check
  entry: yuho fmt --check
  language: python
  types: [file]
  files: '\.yh$'
  additional_dependencies: ['yuho']

- id: yuho-cli-reference-current
  name: Yuho CLI reference up to date
  entry: python3 scripts/gen_cli_reference.py --check
  language: python
  pass_filenames: false
  always_run: true
  additional_dependencies: ['yuho']
