id: s378-with-consent
section: "378"
scenario: |
  A asks B if he can borrow B's umbrella for the afternoon. B agrees
  and hands the umbrella to A. A walks away with the umbrella,
  intending to return it that evening as agreed. B has clearly
  consented to A's possession of the umbrella for the agreed period.
