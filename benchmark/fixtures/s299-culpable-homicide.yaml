id: s299-culpable-homicide
section: "299"
scenario: |
  During an altercation in a parking lot, A pushes B with the intent
  to seriously injure B. B falls backwards, strikes the back of his
  head against a concrete kerb, and dies several hours later from
  the head injury. A intended to cause bodily injury that A knew
  was likely to result in death, but did not specifically intend B's
  death.
