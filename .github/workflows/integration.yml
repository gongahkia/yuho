name: Integration Tests

on:
  workflow_call:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  library-validation:
    name: Validate Library Statutes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node.js (for tree-sitter CLI)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install Yuho
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir .[dev]

      - name: Check all library statutes
        run: |
          failed=0
          for statute in library/penal_code/*/statute.yh; do
            echo "--- Checking $statute ---"
            if ! yuho check "$statute"; then
              failed=1
            fi
          done
          exit $failed

      - name: Check all example files
        run: |
          failed=0
          for example in examples/*.yh; do
            echo "--- Checking $example ---"
            if ! yuho check "$example"; then
              failed=1
            fi
          done
          exit $failed

      - name: Check all test statute files
        run: |
          failed=0
          for test_file in library/penal_code/*/test_statute.yh; do
            if [ -f "$test_file" ]; then
              echo "--- Checking $test_file ---"
              if ! yuho check "$test_file"; then
                failed=1
              fi
            fi
          done
          exit $failed

  cli-commands:
    name: CLI Command Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node.js (for tree-sitter CLI)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install Yuho
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir .[dev]

      - name: Version check
        run: yuho --version

      - name: AST command
        run: yuho ast examples/simple_statute.yh

      - name: Transpile to all text targets
        run: |
          mkdir -p /tmp/transpile-out
          for target in json english latex mermaid mindmap alloy docx akomantoso legalruleml; do
            echo "--- Transpiling to $target ---"
            yuho transpile library/penal_code/s415_cheating/statute.yh \
              --target "$target" \
              -o "/tmp/transpile-out/s415.$target"
          done
          echo "--- Files generated ---"
          ls -la /tmp/transpile-out/

      - name: Lint command
        run: yuho lint library/penal_code/s378_theft/statute.yh

      - name: Schema command
        run: yuho schema > /dev/null

      - name: Explain command
        run: |
          cat > /tmp/yuho-facts.json <<'JSON'
          {"taking": true, "intention": true, "possession": true, "consent": true, "movement": true}
          JSON
          yuho explain --facts /tmp/yuho-facts.json library/penal_code/s378_theft/statute.yh

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node.js (for tree-sitter CLI)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install Yuho
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir .[dev]

      - name: Run property-based tests with extended examples
        run: pytest tests/test_properties.py tests/test_statutes.py -v --hypothesis-seed=0 -x

      - name: Run E2E test suite
        run: pytest tests/e2e/ -v -x

      - name: Run library statute tests
        run: pytest tests/test_library_statutes.py -v -x
