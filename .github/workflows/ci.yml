name: Yuho CI/CD on push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create logs directory
        run: mkdir -p logs

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Set up Node.js (for tree-sitter CLI)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black mypy
          pip install --no-cache-dir .[dev] 2>&1 | tee logs/install-yuho.log

      - name: Check formatting with Black
        run: black --check --diff --config pyproject.toml src/yuho tests 2>&1 | tee logs/black.log

      - name: Type check with mypy
        run: mypy src/yuho --ignore-missing-imports 2>&1 | tee logs/mypy.log

      - name: Verify CLI reference is up-to-date
        run: python3 scripts/gen_cli_reference.py --check 2>&1 | tee logs/cli-reference.log

      - name: Upload lint logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lint-logs
          path: logs/
          retention-days: 7

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create logs directory
        run: mkdir -p logs

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js (for tree-sitter CLI)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir .[dev] 2>&1 | tee logs/install-yuho.log
          pip list 2>&1 | tee logs/pip-list.log

      - name: Smoke test parser CLI
        run: yuho check examples/simple_statute.yh 2>&1 | tee logs/smoke-check.log

      - name: Run tests
        run: |
          pytest tests/ -v --tb=long 2>&1 | tee logs/pytest.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-logs-py${{ matrix.python-version }}
          path: logs/
          retention-days: 7

  akn-xsd:
    name: Akoma Ntoso XSD round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Set up Node.js (for tree-sitter CLI)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Install Yuho deps
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir .[dev]

      - name: Round-trip every section through AKN + xmllint --schema
        run: |
          python scripts/akn_roundtrip.py --xsd | tee akn-xsd.log
          # Hard-fail when any section fails XSD validation; the script
          # already exits non-zero, but pin it explicitly here so the
          # CI job surfaces the failure even if `tee` masks the rc.
          grep -q "524/524 validate clean" akn-xsd.log

      - name: Upload AKN XSD log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: akn-xsd-log
          path: akn-xsd.log
          retention-days: 7

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build .

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/
