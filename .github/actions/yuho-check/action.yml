name: 'Yuho Statute Check'
description: 'Validate Yuho (.yh) statute files'
inputs:
  directory:
    description: 'Directory to scan for .yh files'
    required: false
    default: '.'
  python-version:
    description: 'Python version'
    required: false
    default: '3.12'
  format:
    description: 'Output format (json or sarif)'
    required: false
    default: 'sarif'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: ${{ inputs.python-version }}
    - shell: bash
      run: pip install yuho
    - shell: bash
      run: |
        yuho ci-report ${{ inputs.directory }} \
          --format ${{ inputs.format }} \
          -o yuho-results.${{ inputs.format == 'sarif' && 'sarif' || 'json' }}
    - if: inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
      with:
        sarif_file: yuho-results.sarif
