[statute]
section_number = "376"
title = "Punishment for rape"
jurisdiction = "India"
version = "1.0.0"

[contributor]
name = "Yuho Team"
email = ""

[description]
summary = "Indian Penal Code 1860 s376 — two-tier penalty for rape. Subsection (1) ordinary rape: 7 years to life + fine, with a marital under-12 mitigation and a court-discretion floor. Subsection (2) aggravated forms (police / public-servant / jail-staff / hospital-staff custody, pregnant-victim, under-12, gang rape): 10 years to life + fine with a hard floor."
source = "Indian Penal Code 1860, Section 376"

[verification]
last_verified = "2026-05-01"
sso_url = "https://www.advocatekhoj.com/library/bareacts/indianpenalcode/376.php"
verified_by = "Yuho Team"
disclaimer = "Educational purposes only. Pre-2013 IPC penalty shape; modern Indian practice reads s376 as amended."

[comparative]
sg_counterpart = "376"
shared_lineage = true
divergence_notes = "SG s376 was rewritten alongside s375 in 2007/2019 amendments; the SG penalty structure is now sentencing-framework-driven (Terence Ng) rather than mandatory-floor-driven. IPC retains the mandatory-floor shape with court-discretion override."
