[comparative]
sg_counterpart = "377BA"
shared_lineage = true
divergence_notes = "Headline divergence: SG repealed s509 in the 2019 Criminal Law Reform Act and replaced it with s377BA — gender-neutral 'word, gesture or act intended to insult modesty of any person'. IPC retained the gendered (woman-only-victim) form. The s509 → s377BA migration is the textbook example of doctrinal modernisation that IPC has not undertaken at this corpus snapshot."
