disclaimer = "Educational purposes only. The encoded shape is the pre-2013 IPC. Modern Indian practice reads s375 as amended by the Criminal Law (Amendment) Act 2013."

[comparative]
sg_counterpart = "375"
shared_lineage = true
divergence_notes = "Major divergence post-2007/2019. SG s375 underwent two material rewrites — 2007 (gender-neutral expansion to non-PIV penetration) and 2019 (mental-capacity tightening) — that have no IPC analogue at this corpus snapshot. The pre-2013 IPC text scraped here is the lineage-original; modern Indian practice has since moved closer to (but not aligned with) the SG shape via the 2013 Indian amendment."
