[description]
summary = "Indian Penal Code 1860 s375 — definition of rape via six descriptions covering against-will, without-consent, fear-induced consent, identity-fraud, mental-incapacity-or-intoxication, and under-age intercourse. Carries a marital exception. Encoding reflects the pre-2013 shape per AdvocateKhoj's text; see divergence_notes for the post-2013 Indian amendment that materially expanded the offence."
source = "Indian Penal Code 1860, Section 375"

