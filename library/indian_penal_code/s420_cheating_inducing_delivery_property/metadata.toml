[comparative]
sg_counterpart = "420"
shared_lineage = true
divergence_notes = "Lineage-identical elements. Modern divergence: SG added s420A (obtaining services dishonestly, 2007) — covers the modern services-economy gap that IPC s420's 'property + valuable security' framing leaves open. IPC has no equivalent; cheating-of-services prosecutions in India route through s420 with strained reading."
