[description]
summary = "Indian Penal Code 1860 s300 — culpable homicide is murder under any of four mens-rea limbs (intention to kill / intention to cause likely-fatal injury / intention to cause sufficient-in-ordinary-course injury / knowledge of imminent danger), subject to five general exceptions (grave and sudden provocation, private-defence excess, public-servant excess, sudden fight, consent of victim above 18). Mirrors Singapore Penal Code 1871 s300 in lineage; modern divergence sits in penalty (s302) and the s300A/B amendments not present in IPC."
source = "Indian Penal Code 1860, Section 300"

