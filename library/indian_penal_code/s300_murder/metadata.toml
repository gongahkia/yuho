[comparative]
sg_counterpart = "300"
shared_lineage = true
divergence_notes = "SG s300 elements + 5 exceptions track IPC verbatim; modern divergence in s300A/B (causing death by act amounting to culpable homicide; death by reckless driving) which IPC lacks. Penalty divergence in s302 — IPC mandates death OR life; SG offers either at court's discretion."
