[comparative]
sg_counterpart = null
shared_lineage = false
divergence_notes = "Headline divergence: Singapore never criminalised adultery in the 1872 Penal Code, despite otherwise tracking IPC closely. Adultery in SG is purely a civil/matrimonial matter under the Women's Charter (s95 grounds for divorce). The asymmetric-liability shape of IPC s497 (wife not punishable) — and the 2018 Indian Supreme Court ruling reading it down — make this a useful point for the §8 prose on jurisdictional divergence."
