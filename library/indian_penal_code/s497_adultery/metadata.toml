[description]
summary = "Indian Penal Code 1860 s497 — sexual intercourse with another man's wife without his consent or connivance. Asymmetric liability (only the male partner punishable; wife is not punishable even as abettor). Struck down as unconstitutional by Joseph Shine v Union of India (2018) but remains on the statute books — encoding captures textual shape; operational effect nil post-2018."
source = "Indian Penal Code 1860, Section 497"

