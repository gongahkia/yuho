[description]
summary = "Indian Penal Code 1860 s302 — punishment provision for murder (s300). Mandatory death OR life imprisonment, plus fine. SG s302 covers the same penalty space but, post-2013 amendments, gives the court discretion between death and life imprisonment for non-aggravated murder; IPC retains the harder mandatory floor."
source = "Indian Penal Code 1860, Section 302"

