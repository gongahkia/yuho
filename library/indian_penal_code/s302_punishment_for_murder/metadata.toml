[comparative]
sg_counterpart = "302"
shared_lineage = true
divergence_notes = "SG amended 2013-01-01 to give the court discretion between death and life imprisonment for s300(a)-(d) murder; IPC retains the mandatory-death-or-life shape with court discretion only on which alternative."
