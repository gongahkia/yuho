[statute]
section_number = "155"
title = "Liability of person for whose benefit a riot is committed"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "Imposes fine liability on a person for whose benefit a riot is committed if that person or the person's agent or manager had reason to foresee it and failed to use lawful means to prevent, suppress, and disperse it."
source = "Singapore Penal Code 1871, Section 155"

