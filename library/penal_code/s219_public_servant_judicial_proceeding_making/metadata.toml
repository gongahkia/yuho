[statute]
section_number = "219"
title = "Public servant in a judicial proceeding making an order, etc., which he knows to be contrary to law"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
