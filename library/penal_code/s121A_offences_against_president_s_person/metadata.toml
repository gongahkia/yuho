[description]
summary = "Whoever plans the death, hurt, unlawful imprisonment or restraint of the President is punishable with imprisonment for life or up to 20 years and, if not sentenced to life imprisonment, is also liable to fine."
source = "Singapore Penal Code 1871, Section 121A"

