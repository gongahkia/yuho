summary = "Whoever makes, publishes or circulates any statement, rumour or report in written, electronic or other media — ( a ) with intent to cause, or which is likely to cause any officer or serviceman in the Singapore Armed Forces or any visiting forces lawfully present in Singapore, or any person to whom section 140B refers, to mutiny or otherwise disregard or fail in his duty as such; ( b ) with intent to cause, or which is likely to cause, fear or ..."
