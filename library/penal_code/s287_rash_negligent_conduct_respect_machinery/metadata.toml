[description]
summary = "Section 287 defines an offence of acting with machinery in one’s possession or care rashly or negligently where specified risks or harms to others result or are likely, and clarifies that the act may be an omission to take sufficient safety measures."
source = "Singapore Penal Code 1871, Section 287"

