[statute]
section_number = "119"
title = "A public servant concealing a design to commit an offence which it is his duty to prevent"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "This section criminalises a public servant who, to facilitate an offence he is duty-bound to prevent, conceals the design to commit it or makes a knowingly false representation about that design."
source = "Singapore Penal Code 1871, Section 119"

