[statute]
section_number = "389"
title = "Putting person in fear of accusation of offence, in order to commit extortion"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Putting or attempting to put a person in fear of accusation of a serious offence in order to commit extortion is punishable with up to 10 years imprisonment, and also liable to fine or caning."
source = "Singapore Penal Code 1871, Section 389"

