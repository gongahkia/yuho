[description]
summary = "Voluntarily causing grievous hurt in order to extort a confession or information, or to compel restoration of property or satisfaction of a claim, is an offence punishable with up to 10 years' imprisonment and an unlimited fine, with separate statutory liability to caning."
source = "Singapore Penal Code 1871, Section 331"

