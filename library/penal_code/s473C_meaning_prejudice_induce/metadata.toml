[description]
summary = "For the purposes of section 473B and subject to subsections (2) and (4), an act or omission intended to be induced is to a person’s prejudice if, and only if, it is one which, if it occurs, will — ( a ) result in his permanent or temporary loss of property; ( b ) result in his being deprived of an opportunity to earn remuneration or greater remuneration; ( c ) result in his being deprived of an opportunity to gain a financial advantage otherwi..."
source = "Singapore Penal Code 1871, Section 473C"

