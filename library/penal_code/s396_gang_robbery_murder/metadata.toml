[statute]
section_number = "396"
title = "Gang-robbery with murder"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Where any one of 5 or more persons conjointly committing gang-robbery commits murder, every one of them is punishable with death or life imprisonment, and if not sentenced to death, with caning of not less than 12 strokes."
source = "Singapore Penal Code 1871, Section 396"

