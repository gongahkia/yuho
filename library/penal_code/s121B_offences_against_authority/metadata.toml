[description]
summary = "Planning the unlawful deprivation or deposition of the President from Singapore’s sovereignty, or the overawing of the Government by criminal force, is an offence punishable with life imprisonment or up to 20 years’ imprisonment and, if life imprisonment is not imposed, an unlimited fine."
source = "Singapore Penal Code 1871, Section 121B"

