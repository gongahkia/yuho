[description]
summary = "Whoever commits the offence of criminal intimidation shall be punished with imprisonment for a term which may extend to 2 years, or with fine, or with both; and if the threat is to cause death or grievous hurt, or to cause the destruction of any property by fire, or to cause an offence punishable with death or with imprisonment for a term which may extend to 7 years or more, shall be punished with imprisonment for a term which may extend to 10..."
