[statute]
section_number = "110"
title = "Punishment of abetment if the person abetted does the act with a different intention from that of the abettor"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Where the person abetted commits the act with a different intention or knowledge from the abettor, the abettor is punished with the punishment provided for the offence that would have been committed with the abettors intention or knowledge and no other."
source = "Singapore Penal Code 1871, Section 110"

[verification]
sso_url = "https://sso.agc.gov.sg/Act/PC1871?ProvIds=pr110-#pr110-"
