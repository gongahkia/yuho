[statute]
section_number = "106"
title = "When such right extends to causing any harm other than death"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Where triggering offence is theft, mischief or criminal trespass not of a section 105 description, the right of private defence of property does not extend to causing death but does extend, subject to sections 98 and 106A, to causing any harm other than death."
source = "Singapore Penal Code 1871, Section 106"

