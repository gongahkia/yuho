[statute]
section_number = "411"
title = "Dishonestly Receiving Stolen Property"
jurisdiction = "Singapore"
version = "1.0.0"

[contributor]
name = "Yuho Team"
email = ""

[description]
summary = "Whoever dishonestly receives or retains any stolen property, knowing or having reason to believe the property to be stolen, shall be punished with imprisonment for a term which may extend to 5 years, or with fine, or with both."
source = "Singapore Penal Code 1871, Section 411"

