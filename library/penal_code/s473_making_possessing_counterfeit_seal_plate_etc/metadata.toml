[statute]
section_number = "473"
title = "Making or possessing a counterfeit seal, plate, etc., with intent to commit a forgery punishable otherwise"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Whoever makes or counterfeits any seal, plate or other instrument for making an impression, intending that the same shall be used for the purpose of committing any forgery which would be punishable under any section of this Chapter other than section 467, or with such intent has in his possession any such seal, plate or other instrument, knowing the same to be counterfeit, shall be punished with imprisonment for a term which may extend to 10 y..."
source = "Singapore Penal Code 1871, Section 473"

