[statute]
section_number = "169"
title = "Public servant unlawfully buying or bidding for property"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "A public servant who is legally barred from buying or bidding for certain property commits an offence by purchasing or bidding for that property and faces imprisonment, fine, or both, with confiscation if purchased."
source = "Singapore Penal Code 1871, Section 169"

