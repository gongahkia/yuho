[statute]
section_number = "363"
title = "Punishment for Kidnapping"
jurisdiction = "Singapore"
version = "1.0.0"

[contributor]
name = "Yuho Team"
email = ""

[description]
summary = "Whoever kidnaps any person from Singapore or from lawful guardianship, shall be punished with imprisonment for a term which may extend to 10 years, and shall also be liable to fine or to caning."
source = "Singapore Penal Code 1871, Section 363"

