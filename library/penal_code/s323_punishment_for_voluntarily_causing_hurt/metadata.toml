[statute]
section_number = "323"
title = "Punishment for Voluntarily Causing Hurt"
jurisdiction = "Singapore"
version = "1.0.0"

[contributor]
name = "Yuho Team"
email = ""

[description]
summary = "Whoever, except in the case provided for by section 334, voluntarily causes hurt, shall be punished with imprisonment for a term which may extend to 3 years, or with fine which may extend to $5,000, or with both."
source = "Singapore Penal Code 1871, Section 323"

