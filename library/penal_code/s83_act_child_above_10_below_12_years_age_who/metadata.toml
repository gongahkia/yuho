[statute]
section_number = "83"
title = "Act of a child of or above 10 and below 12 years of age, who has not sufficient maturity of understanding"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "A child aged 10 or above but below 12 does not commit an offence if the child lacks sufficient maturity to judge the nature and consequence of the conduct on that occasion."
source = "Singapore Penal Code 1871, Section 83"

