[statute]
section_number = "120B"
title = "Punishment of criminal conspiracy"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Whoever is a party to a criminal conspiracy is, where no express provision for punishment is made in the Code, punished in the same manner as if he had abetted the offence that is the subject of the conspiracy."
source = "Singapore Penal Code 1871, Section 120B"

[verification]
