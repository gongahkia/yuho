[statute]
section_number = "173"
title = "Preventing service of summons, etc., or preventing publication thereof"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "This section makes it an offence intentionally to prevent service, lawful affixing, or lawful proclamation of specified process from a legally competent public servant, with a higher penalty where the process concerns attendance or production before a court."
source = "Singapore Penal Code 1871, Section 173"

