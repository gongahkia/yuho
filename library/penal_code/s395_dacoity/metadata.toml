[statute]
section_number = "395"
title = "Punishment for Dacoity"
jurisdiction = "Singapore"
version = "1.0.0"

[contributor]
name = "Yuho Team"
email = ""

[description]
summary = "Whoever commits dacoity shall be punished with imprisonment for a term of not less than 5 years and not more than 20 years, and shall also be punished with caning with not less than 12 strokes."
source = "Singapore Penal Code 1871, Section 395"

