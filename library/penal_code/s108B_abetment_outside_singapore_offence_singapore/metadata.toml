[statute]
section_number = "108B"
title = "Abetment outside Singapore of an offence in Singapore"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "Treats a person as abetting an offence within the Penal Code where the abetted offence is committed in Singapore even though any or all of the abetment acts were done outside Singapore."
source = "Singapore Penal Code 1871, Section 108B"

[verification]
sso_url = "https://sso.agc.gov.sg/Act/PC1871?ProvIds=pr108B-#pr108B-"
