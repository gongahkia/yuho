[statute]
section_number = "392"
title = "Punishment for Robbery"
jurisdiction = "Singapore"
version = "1.0.0"

[contributor]
name = "Yuho Team"
email = ""

[description]
summary = "Whoever commits robbery shall be punished with imprisonment for a term of not less than 2 years and not more than 14 years, and shall also be punished with caning of not less than 6 strokes."
source = "Singapore Penal Code 1871, Section 392"

