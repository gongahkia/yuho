[description]
summary = "Section 404 criminalises dishonestly misappropriating or converting property known to have been in a deceased person's possession at death before any legally entitled person has taken possession, with a higher imprisonment ceiling for the deceased's clerk or servant."
source = "Singapore Penal Code 1871, Section 404"

