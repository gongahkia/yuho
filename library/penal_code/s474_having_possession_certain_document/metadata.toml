summary = "Whoever has in his possession any document or electronic record, knowing the same to be forged, and intending that the same shall fraudulently or dishonestly be used as genuine, shall, if the document or electronic record is one of the descriptions mentioned in section 466, be punished with imprisonment for a term which may extend to 10 years, and shall also be liable to fine; and if the document is one of the descriptions mentioned in section..."
source = "Singapore Penal Code 1871, Section 474"

