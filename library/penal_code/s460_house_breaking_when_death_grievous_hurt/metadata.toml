[statute]
section_number = "460"
title = "House-breaking when death or grievous hurt caused"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "Joint participants in a house-breaking are punishable if, during the house-breaking, any guilty participant voluntarily causes or attempts to cause death or grievous hurt to any person."
source = "Singapore Penal Code 1871, Section 460"

