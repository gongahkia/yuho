[statute]
section_number = "112"
title = "Abettor, when liable to cumulative punishment for act abetted and for act done"
jurisdiction = "Singapore"
version = "2.0.0"

[encoding]
depth = "deep"
revision = "phase-D"

[contributor]
name = "agent-reencoding-phase-D"

[description]
summary = "Section 112 makes an abettor liable to punishment for each offence where the additional act attracting section 111 liability is committed in addition to the act abetted and is a distinct offence."
source = "Singapore Penal Code 1871, Section 112"

