[statute]
section_number = "112"
title = "Abettor, when liable to cumulative punishment for act abetted and for act done"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "If the act for which the abettor is liable under section 111 is committed in addition to the act abetted and constitutes a distinct offence, the abettor is liable to punishment for each offence."
source = "Singapore Penal Code 1871, Section 112"

