[statute]
section_number = "473A"
title = "Making or possessing equipment for making a false instrument"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Whoever makes or has in his custody or under his control a machine or implement, or paper or other material, which to his knowledge is or has been specifically designed or adapted for the making of any false instrument shall be punished with imprisonment for a term which may extend to 5 years, or with fine, or with both."
source = "Singapore Penal Code 1871, Section 473A"

[verification]
sso_url = "https://sso.agc.gov.sg/Act/PC1871?ProvIds=pr473A-#pr473A-"
