[description]
summary = "This section criminalises failing to take reasonable steps to protect a domestic worker or vulnerable person from a foreseen risk of neglect, hurt, grievous hurt, sexual abuse, or injury to mental health caused by another person's unlawful act."
source = "Singapore Penal Code 1871, Section 335A"

