[statute]
section_number = "125"
title = "Waging war against any power in alliance or at peace with Singapore"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Whoever wages war against the government of any power in alliance or at peace with the Government of Singapore, or attempts to wage such war, or abets the waging of such war, is punishable with life imprisonment or up to 15 years, to which fine may be added, or with fine."
source = "Singapore Penal Code 1871, Section 125"

