[statute]
section_number = "72"
title = "Punishment of a person found guilty of one of several offences, the judgment stating that it is doubtful of which"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Where guilt is certain for one of several offences but doubtful which, the offender is punished for the offence with the lowest punishment."
source = "Singapore Penal Code 1871, Section 72"

[verification]
sso_url = "https://sso.agc.gov.sg/Act/PC1871?ProvIds=pr72-#pr72-"
