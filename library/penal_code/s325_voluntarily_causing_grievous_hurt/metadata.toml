[statute]
section_number = "325"
title = "Voluntarily Causing Grievous Hurt"
jurisdiction = "Singapore"
version = "1.0.0"

[contributor]
name = "Yuho Team"
email = ""

[description]
summary = "Whoever, except in the case provided for by section 335, voluntarily causes grievous hurt, shall be punished with imprisonment for a term which may extend to 10 years, and shall also be liable to fine or to caning."
source = "Singapore Penal Code 1871, Section 325"

