[description]
summary = "This section criminalises administering or causing the taking of poison, stupefying or intoxicating substances, or other harmful substances with intent to cause hurt or to commit or facilitate an offence, or knowing hurt is likely."
source = "Singapore Penal Code 1871, Section 328"

