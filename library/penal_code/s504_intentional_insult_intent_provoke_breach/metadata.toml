[statute]
section_number = "504"
title = "Intentional insult with intent to provoke a breach of the peace"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Whoever intentionally insults, and thereby gives provocation to any person, intending or knowing it to be likely that such provocation will cause him to break the public peace, or to commit any other offence, shall be punished with imprisonment for a term which may extend to 2 years, or with fine, or with both."
source = "Singapore Penal Code 1871, Section 504"

[verification]
sso_url = "https://sso.agc.gov.sg/Act/PC1871?ProvIds=pr504-#pr504-"
