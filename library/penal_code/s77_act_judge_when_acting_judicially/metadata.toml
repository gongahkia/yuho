[statute]
section_number = "77"
title = "Act of judge when acting judicially"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Nothing is an offence which is done by a judge when acting judicially in the exercise of any power given, or believed in good faith to be given, by law."
source = "Singapore Penal Code 1871, Section 77"

