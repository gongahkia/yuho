[statute]
section_number = "115"
title = "Abetment of offence punishable with death or imprisonment for life"
jurisdiction = "Singapore"
version = "1.0.0"

[encoding]
depth = "deep"

[contributor]
name = "agent-draft"

[description]
summary = "Whoever abets an offence punishable with death or imprisonment for life, where the offence is not committed and no express provision is made for such abetment, is punishable with imprisonment up to 20 years, and is liable to fine or caning."
source = "Singapore Penal Code 1871, Section 115"

[verification]
