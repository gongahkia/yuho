[description]
summary = "Theft preceded by preparation to cause death, hurt, or restraint to commit theft, escape, or retain stolen property is punishable with up to 10 years imprisonment and caning with not less than 3 strokes."
source = "Singapore Penal Code 1871, Section 382"

