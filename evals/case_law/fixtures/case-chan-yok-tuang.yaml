id: case-chan-yok-tuang
case_citation: "Chan Yok Tuang v Public Prosecutor [2008] SGHC 137"
actual_charge: "506"
alternative_charge: null
court_distinguished_on: []
outcome: "Convicted on a guilty plea of criminal intimidation under s 506 of the Penal Code; sentenced to three months' imprisonment for threatening a police officer."
case_summary: |
  The appellant uttered the words "I will shoot her to death" in Hokkien at a
  police officer, with intent to cause her alarm. The threat targeted the
  officer's person (a threat to cause death) and was made with the requisite
  intent to cause alarm. The appellant pleaded guilty to the charge under
  s 506 of the Penal Code without qualification and was sentenced to three
  months' imprisonment. The case is illustrative of the s 506 first-limb
  punishment regime (intimidation simpliciter, prior to the [15/2019]
  amendment that introduced the aggravated-threat second limb).
