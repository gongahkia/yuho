id: case-2016-sghc-154-paper-cutter
case_citation: "[2016] SGHC 154 (anonymised judgment)"
actual_charge: "506"
alternative_charge: null
court_distinguished_on: []
outcome: "Convicted of criminal intimidation under s 506 (first limb) of the Penal Code: by holding a paper-cutter and pointing it at the victim while threatening to cut her if she did not stop crying, with intent to cause alarm."
case_summary: |
  The accused held a paper-cutter and pointed it at the victim while
  threatening to cut her if she did not stop crying. The threat was directed
  at the victim's person (threat of injury) and was made with the requisite
  intent to cause alarm. The case is illustrative of s 506 first-limb
  prosecution where the threat is to cause injury (not death) and is
  accompanied by an implement that turns the verbal threat into an immediate
  prospect of harm.
