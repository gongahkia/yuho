court_distinguished_on: [intent3]
outcome: "Convicted of s300(c) murder; sentence enhanced to death on prosecution appeal."
case_summary: |
  The accused and accomplices abducted the victim, drove him around in a
  van, and beat him to death over hours. The Court of Appeal enhanced
  the sentence on prosecution appeal — sustained brutal beating with intent
  to inflict the multiple injuries actually inflicted, those injuries
  being sufficient in the ordinary course of nature to cause death.
section: "300"
description: |
  A and accomplices abducted B and beat B sustainedly for several hours in a
  van. B died from the cumulative injuries. A intended to inflict the
  multiple injuries actually inflicted; those injuries were objectively
  sufficient in the ordinary course of nature to cause death.
