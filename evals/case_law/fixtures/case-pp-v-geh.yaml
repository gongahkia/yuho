outcome: |
  Conviction under s377BE(1) read with s377BE(3) on guilty plea; 18 months'
  imprisonment for the headline distribution charge — markedly heavier than
  GED's 12 weeks because the distribution targeted V2's identified contact
  network (>500 WhatsApp recipients including colleagues and friends),
  rather than an indiscriminate Facebook audience. Three further charges
  taken into consideration: s506 r/w s34 criminal intimidation with common
  intention, and two s377BA insulting-modesty charges. Decided alongside
  GED in the same judgment that established the s377BE five-step
  sentencing framework keyed on objective harm aspects.
case_summary: |
  GEH, age 38, participated in assaulting a man (V2) suspected of having
  an affair with his wife. During the attack, GEH recorded a 55-second
  video of V2's exposed genitals and injured face. He then sent the
  video to E and more than 500 of V2's contacts via WhatsApp, including
  V2's colleagues and friends. The targeted-distribution shape (named
  contacts known to V2) drove the materially heavier 18-month
  imprisonment compared with co-accused GED's 12 weeks for an
  indiscriminate Facebook post: identified-recipient distribution
  produces sharper humiliation harm than diffuse-audience distribution
  on the §377BE harm framework. Citation verified against eLitigation
  2026-04-30.
section: "377BE"
description: |
  A intentionally distributed an intimate recording of B (a 55-second
  video showing B's exposed genitals and injured face) by sending it via
  WhatsApp to a named recipient and more than 500 of B's known contacts,
  including B's colleagues and friends. B did not consent to the
  distribution. A knew or had reason to believe that the targeted
  distribution to B's contact network would cause B humiliation, alarm
  or distress.
