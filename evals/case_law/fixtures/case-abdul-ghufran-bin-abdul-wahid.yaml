outcome: |
  Notional 9 months' imprisonment for the s377BA charge as part of a
  six-charge basket of sexual / hurt offences. Disposition not a
  conviction strictly speaking — accused was held unfit to plead under
  s 248(2) Criminal Procedure Code 2010 owing to moderate intellectual
  disability, so proceedings were stayed and the sentencing exercise
  ran on a notional basis. The s377BA charge specifically captured
  the genitalia-exposure act; the related conduct (biting, grinding,
  humping) grounded the contemporaneous s323 voluntarily-causing-hurt
  and s354 outrage-of-modesty charges. Useful chapter-XXIII fixture
  growth for the unfit-to-plead / s84 unsoundness-of-mind structural
  intersection (s84 is a general-defence exception edge on s377BA in
  the encoded library; the procedural stay under s 248(2) CPC sits
  alongside, not within, that doctrinal axis).
case_summary: |
  The accused, a 30-year-old man with moderate intellectual disability,
  committed six offences across two days (1 and 25 December 2024)
  against four elderly male victims (one aged 68). On 1 December 2024
  he removed his pants and revealed his genitalia to the 68-year-old
  victim. Other charges captured biting (causing bleeding) and
  grinding/humping conduct. Held unfit to plead under s 248(2) CPC
  due to moderate intellectual disability; proceedings stayed and a
  notional 9-month imprisonment term recorded for sentencing-framework
  purposes. Citation verified against eLitigation 2026-04-30.
