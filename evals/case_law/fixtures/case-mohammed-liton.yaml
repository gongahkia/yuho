id: case-mohammed-liton
case_citation: "Mohammed Liton Mohammed Syeed Mallik v PP [2008] 1 SLR(R) 601"
actual_charge: "375"
outcome: "Conviction for rape under s375 affirmed; the Court of Appeal laid down the pre-Terence-Ng sentencing benchmarks for s375 rape, with the 'group-1/2/3/4' categorisation."
case_summary: |
  The accused raped the complainant. The Court of Appeal affirmed the
  s375 conviction and used the appeal to set out a structured
  sentencing framework for rape — categorising rape cases into groups
  by reference to aggravating features. This framework governed s375
  sentencing until it was restated in Terence Ng (2017).
