id: case-tan-cheng-yew
case_citation: "Tan Cheng Yew v PP [2013] 1 SLR 1095"
actual_charge: "409"
alternative_charge: "406"
court_distinguished_on: [banker_merchant_factor_broker_attorney_agent_capacity, director_capacity]
outcome: "Convicted of s409 CBT by agent (solicitor capacity) and related s420 cheating."
case_summary: |
  A solicitor misappropriated client funds entrusted to him in his
  professional capacity. The Court of Appeal held that s409 'agent'
  clearly applied to a solicitor entrusted with client moneys —
  contrasting later with the narrower City Harvest interpretation which
  excluded charity-governing-board members under the pre-2019 s409
  wording.
section: "409"
description: |
  A is a practising solicitor. Clients entrusted A with funds in his
  professional / agent capacity. A misappropriated those funds for his own
  purposes. A's fiduciary capacity as a solicitor falls squarely within
  the s409 'agent' category.
