id: case-adf-v-pp
case_citation: "ADF v PP [2010] 1 SLR 874"
actual_charge: "324"
outcome: "Conviction for voluntarily causing hurt by dangerous weapons / means under s324 affirmed by the Court of Appeal."
case_summary: |
  The appellant used a dangerous instrument to inflict hurt on the
  victim. The Court of Appeal affirmed the s324 conviction (voluntarily
  causing hurt by dangerous weapons or means), holding that the means
  used were within the s324 category and that the mens rea of voluntary
  causing of hurt was made out. Regularly cited for the scope of the
  s324 instrument categories.
section: "324"
description: |
  A used a dangerous instrument to strike B, causing B hurt. A intended
  to cause hurt to B. The instrument was within the s324 category of
  dangerous weapons or means.
parties:
  A: { role: accused }
  B: { role: victim }
