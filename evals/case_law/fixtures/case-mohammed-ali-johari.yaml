id: case-mohammed-ali-johari
case_citation: "Mohammed Ali bin Johari v PP [2008] 4 SLR(R) 1058"
actual_charge: "300"
alternative_charge: "304"
court_distinguished_on: [intent3]
outcome: "Convicted of s302 murder under s300(c)."
case_summary: |
  The accused inflicted fatal head injuries on his stepdaughter Nonoi by
  shaking and striking her. The Court of Appeal held that the head injuries
  were inflicted intentionally and were objectively sufficient in the
  ordinary course of nature to cause death — squarely s300(c). Diminished
  responsibility was rejected.
section: "300"
description: |
  A inflicted severe head injuries on his stepdaughter B (a child) by
  forceful shaking and striking. B died from the head injuries. A intended
  to inflict the bodily injury actually inflicted; the injury was
  objectively sufficient in the ordinary course of nature to cause death.
