court_distinguished_on: [distribution, no_consent, knows_likely_distress]
outcome: |
  Conviction under s377BE(1) read with s377BE(3) on guilty plea; 12 weeks'
  imprisonment for the headline charge. Two further charges (s377BD(1)(b)
  possession and a second s377BE distribution charge for the blurred-face
  re-post) taken into consideration for sentencing. Leading SG sentencing
  authority for s377BE intimate-image-distribution offences; the High Court
  used the appeal to lay down a five-step sentencing framework keyed on
  objective harm aspects (nature of image, victim identifiability,
  distribution scope) and the offender's culpability profile.
case_summary: |
  GED, age 26, accessed his estranged wife's (V1's) mobile phone without
  permission and photographed an intimate image showing her face and body.
  On 12 February 2020 he posted the image to Facebook publicly. The post
  attracted approximately 1,000 comments, 3,000 likes, and 2,000 shares
  before takedown. He later re-posted an edited version with V1's face
  blurred; that re-post grounded a separate s377BE charge taken into
  consideration. The High Court held that the assessment of harm under
  s377BE should be more nuanced than treating sexual content alone as
  determinative — distribution scope, victim identifiability, and the
  nature of the image are all weighed. Citation verified against
  eLitigation 2026-04-30; charge wording and 12-week sentence confirmed
  against the judgment text.
section: "377BE"
description: |
  A intentionally distributed an intimate image of B (B's face and body)
  to a Facebook audience of approximately 1,000 commenters, 3,000 likers,
  and 2,000 sharers. B did not consent to the distribution. A knew or had
  reason to believe that publishing the image to a public Facebook
  audience would cause B humiliation, alarm or distress.
