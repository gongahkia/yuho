outcome: "Convicted of murder under s302 read with s34; CA reviewed the proper test for s34 collateral liability — laying foundation for Daniel Vijay clarification."
case_summary: |
  Three accused robbed and killed the deceased in his flat. The Court of
  Appeal reviewed the proper test for s34 collateral liability —
  subjective knowledge of likely consequences, foundational case for
  the later Daniel Vijay clarification of the doctrine.
section: "300"
description: |
  A and accomplices entered B's flat to rob him. B was killed in the
  course of the robbery — A inflicted the fatal injuries. A intended to
  inflict the bodily injuries actually inflicted; the injuries were
  objectively sufficient in the ordinary course of nature to cause death.
