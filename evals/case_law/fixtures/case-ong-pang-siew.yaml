id: case-ong-pang-siew
case_citation: "Ong Pang Siew v PP [2011] 1 SLR 606"
actual_charge: "304"
alternative_charge: "300"
court_distinguished_on: [intent1, intent3]
outcome: "Trial conviction of s300 reduced to s304(a) on appeal — Exception 7 (diminished responsibility) succeeded."
case_summary: |
  The accused killed his estranged wife's daughter. At trial, diminished
  responsibility under Exception 7 was rejected. On appeal, the Court of
  Appeal accepted expert psychiatric evidence of major depressive disorder
  that had substantially impaired the accused's mental responsibility for
  his acts, and substituted a s304(a) culpable-homicide-not-amounting-to-
  murder conviction.
section: "304"
description: |
  A killed B by stabbing. A had been suffering from major depressive disorder
  at the time of the act, which substantially impaired A's mental
  responsibility. A would otherwise have been convicted under s300 limb (a)
  or limb (c), but the partial defence of diminished responsibility under
  Exception 7 reduced the conviction to s304(a).
parties:
  A: { role: accused }
  B: { role: victim }
acts:
  - { actor: A, description: "stabs B fatally" }
mental_states:
  A:
    intent: "to cause death or fatal injury"
    psychiatric: "major depressive disorder substantially impairing mental responsibility"
circumstances:
  - "Exception 7 (diminished responsibility) succeeded on appeal"
  - "s300 limb (a) intent to kill would otherwise have been made out"
outcomes:
  - { actor: B, description: "B dies from the stab wounds" }
fact_facts:
