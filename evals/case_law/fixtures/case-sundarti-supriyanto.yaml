id: case-sundarti-supriyanto
case_citation: "PP v Sundarti Supriyanto [2004] SGHC 222"
actual_charge: "304"
alternative_charge: "300"
court_distinguished_on: [intent1]
outcome: "Convicted of s304(a) — Exception 1 (grave and sudden provocation) succeeded after sustained employer abuse."
case_summary: |
  A domestic worker killed her employer (and the employer's young child)
  after sustained physical and psychological abuse. Exception 1 (grave and
  sudden provocation) was accepted as a partial defence, reducing what
  would have been s300 to s304(a).
section: "304"
description: |
  A had been subjected to sustained physical and psychological abuse by her
  employer B over an extended period. A killed B in a moment of loss of
  self-control caused by the cumulative provocation. Exception 1 (grave
  and sudden provocation) was accepted; the conviction was reduced from
  s300 to s304(a).
