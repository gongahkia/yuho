outcome: "Conviction under s377BB(4) sustained; sentence reduced from 7 weeks' to 4 weeks' aggregate imprisonment on appeal. 3-judge coram established the Logachev two-stage five-step sentencing framework as the preferred framework for s377BB(4) offences. Leading SG sentencing authority for voyeurism offences; the s509 successor provision now governing the up-skirt-recording case family that was previously prosecuted under repealed s509."
case_summary: |
  The appellant, a 24-year-old NTU student, committed two upskirt-recording
  offences under s377BB(4): one on a university lift, one on a residential
  lift months later while on police bail. He squatted, placed his phone
  camera under the victims' dresses, and recorded. The High Court (3-judge
  coram) affirmed the s377BB(4) convictions and used the appeal to lay down
  the Logachev two-stage five-step sentencing framework as the preferred
  framework for s377BB(4) offences, holding that deterrence is generally the
  dominant sentencing consideration for adult offenders without contributing
  mental conditions. s377BB is the s509 successor provision (repealed
  2020) — case-law growth in chapter XXIII tracks the new framework.
  Citation verified against eLitigation (2026-04-29).
