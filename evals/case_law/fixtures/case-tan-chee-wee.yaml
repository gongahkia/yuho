court_distinguished_on: [intent1]
outcome: "Convicted of s302 murder; partial defences of grave-and-sudden provocation (Exception 1) and sudden fight (Exception 4) rejected."
case_summary: |
  The accused killed an elderly woman during a robbery in her flat. He
  raised partial defences under Exception 1 (grave and sudden provocation)
  and Exception 4 (sudden fight). Both rejected — the assault was
  premeditated, no provocation, no sudden fight.
section: "300"
description: |
  A entered the flat of B, an elderly woman, intending to rob her. A killed
  B in the course of the robbery. A intended to cause B's death (or, in the
  alternative, intended to inflict bodily injury sufficient in the ordinary
  course to cause death). No grave-and-sudden provocation; no sudden fight;
  attack was one-sided and premeditated.
