outcome: "Multiple accused convicted of murder under s302 read with s34 — group attack at Pulau Senang penal settlement."
case_summary: |
  Prison officers were killed when detainees rioted at the Pulau Senang
  penal settlement. Multiple accused were convicted of murder under s302
  read with s34 — common intention established by participation in a
  coordinated group attack on the officers.
section: "300"
description: |
  A and other accused participated in a coordinated group attack on prison
  officer B during a riot. B died from the assault. A and the other
  accused shared a common intention to cause B's death. The act was done
  in furtherance of that common intention.
