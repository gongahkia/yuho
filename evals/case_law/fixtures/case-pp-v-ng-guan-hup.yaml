id: case-pp-v-ng-guan-hup
case_citation: "Public Prosecutor v Ng Guan Hup [2009] SGHC 170"
actual_charge: "425"
alternative_charge: null
court_distinguished_on: [intent_to_cause_wrongful_loss_or_damage, change_in_property]
outcome: "Convicted on a guilty plea of mischief under s 425 of the Penal Code (three charges); pleaded guilty to administering a drug to three racehorses belonging to Charles Leck at the Singapore Turf Club in July 2007."
case_summary: |
  The respondent used a syringe to administer a drug to three racehorses
  belonging to Charles Leck at the Singapore Turf Club sometime in July 2007.
  On 8 April 2008, the respondent pleaded guilty to the charge and admitted
  to the statement of facts without qualification, and was duly convicted of
  mischief under s 425 of the Penal Code. The case illustrates s 425's
  reach beyond classical destruction-of-property fact patterns: doping a
  racehorse changes the property (the horse's competitive utility) in a way
  that diminishes its value or utility, satisfying the
  change-in-property limb of s 425 alongside the
  wrongful-loss-or-damage mens rea.
section: "425"
description: |
  A used a syringe to administer a drug to three racehorses owned by C at
  the Singapore Turf Club. The drug administration affected the racehorses'
  competitive utility — a change in property that diminished its value to C.
  A acted with intent (or with knowledge of the likelihood) of causing
  wrongful loss to C. A was charged under s 425 of the Penal Code (three
  charges, one per horse).
