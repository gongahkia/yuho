id: case-low-song-chye
case_citation: "Low Song Chye v PP [2019] SGHC 140"
case_url: "https://www.elitigation.sg/gd/s/2019_SGHC_140"
actual_charge: "323"
outcome: "Conviction for voluntarily causing hurt under s323 affirmed by the High Court; 3-judge coram restated the sentencing framework for s323 simple-hurt cases."
case_summary: |
  The appellant punched the victim, causing hurt. The High Court
  (sitting as a 3-judge coram) affirmed the s323 conviction and used
  the appeal to set out the sentencing framework for s323 voluntarily
  causing hurt — the band-based approach by reference to the degree of
  injury and culpability. Leading SG sentencing authority for s323.
  Citation verified against eLitigation (2026-04-27).
section: "323"
description: |
  A struck B, causing B bodily pain and injury (hurt under s319). A
  intended to cause hurt to B. The injuries did not rise to grievous
  hurt under s320, so the offence fell under s323 (not s325).
