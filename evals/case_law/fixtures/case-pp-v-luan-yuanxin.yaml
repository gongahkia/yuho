id: case-pp-v-luan-yuanxin
case_citation: "Public Prosecutor v Luan Yuanxin [2002] SGHC 65"
actual_charge: "506"
alternative_charge: null
court_distinguished_on: []
outcome: "Convicted on a guilty plea of criminal intimidation under s 506 of the Penal Code (threat with a deadly weapon); sentenced to two months' imprisonment on the intimidation charge."
case_summary: |
  The respondent pointed a cleaver with a 20 cm blade at his wife and
  threatened to kill her, with intent to cause alarm to her. He pleaded guilty
  to all charges and was convicted and sentenced to two months' imprisonment
  on the criminal intimidation charge under s 506 of the Penal Code. The
  case illustrates a domestic-context s 506 prosecution where the threat was
  accompanied by display of a deadly weapon (cleaver), engaging the
  aggravated-threat penalty regime (threat to cause death).
