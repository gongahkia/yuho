court_distinguished_on: [intent3]
outcome: "Principal (MAG) convicted of s300(c); co-accused convicted of s304(a) read with s34 on appeal."
case_summary: |
  Two East Malaysian accused went on a robbery spree at Kallang, slashing
  victims with a parang; one victim died. Liability differed between the
  parang-wielder (the principal) and the co-accused. Applying Daniel Vijay,
  the co-accused did not subjectively know the principal would inflict
  s300(c)-grade injury, so collateral murder under s34 was not made out
  against him.
section: "300"
description: |
  A is the principal offender who wielded a parang and slashed B during a
  robbery. B died from the slash wounds. A intended to inflict the wounds
  actually inflicted; the wounds were objectively sufficient in the ordinary
  course of nature to cause death.
