id: s363-kidnapping
section: "363"
scenario: |
  A approaches B's 12-year-old daughter outside her school, tells
  her that "your father said I'd pick you up today", and drives her
  away in his car. B never made any such arrangement and did not
  consent. The child is taken several kilometres away before A is
  intercepted.
