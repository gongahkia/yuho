id: s320-grievous-hurt
section: "320"
scenario: |
  A swings a metal pipe at B's leg during a street fight. The blow
  fractures B's femur. B is hospitalised for 18 days and requires
  surgery to insert a metal rod. The fracture significantly impairs
  B's mobility for the next six months. A intended to cause B
  serious injury and the leg fracture is precisely the kind of
  long-term injury contemplated.
